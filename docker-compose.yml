services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/models/forecast_model.pkl
      DATA_DIR: /app/m5_data
    volumes:
      - .:/app
    restart: unless-stopped

  mlflow:
    build: .
    command:
      [
        "mlflow",
        "server",
        "--backend-store-uri",
        "sqlite:////app/mlflow.db",
        "--default-artifact-root",
        "/app/mlruns",
        "--host",
        "0.0.0.0",
        "--port",
        "5000"
      ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    ports:
      - "${MLFLOW_PORT:-5001}:5000"
    volumes:
      - .:/app
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    user: "0:0"
    working_dir: /opt/airflow/project
    environment:
      AIRFLOW_HOME: /opt/airflow/airflow_home
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DATA_DIR: /opt/airflow/project/m5_data
      MODEL_DIR: /opt/airflow/project/models
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: >
      bash -c "mkdir -p /opt/airflow/airflow_home/logs /opt/airflow/airflow_home/dags /opt/airflow/airflow_home/plugins &&
               chown -R 50000:0 /opt/airflow/airflow_home &&
               airflow db migrate &&
               airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    volumes:
      - .:/opt/airflow/project
      - airflow_home:/opt/airflow/airflow_home

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    user: "50000:0"
    working_dir: /opt/airflow/project
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW_HOME: /opt/airflow/airflow_home
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      PYTHONPATH: /opt/airflow/project
      DATA_DIR: /opt/airflow/project/m5_data
      MODEL_DIR: /opt/airflow/project/models
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - .:/opt/airflow/project
      - airflow_home:/opt/airflow/airflow_home
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    user: "50000:0"
    working_dir: /opt/airflow/project
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW_HOME: /opt/airflow/airflow_home
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      PYTHONPATH: /opt/airflow/project
      DATA_DIR: /opt/airflow/project/m5_data
      MODEL_DIR: /opt/airflow/project/models
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: scheduler
    volumes:
      - .:/opt/airflow/project
      - airflow_home:/opt/airflow/airflow_home
    restart: unless-stopped

volumes:
  airflow_home:
