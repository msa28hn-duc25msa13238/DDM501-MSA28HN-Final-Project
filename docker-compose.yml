services:
  api:
    build: .
    user: "50000:0"
    ports:
      - "8000:8000"
    environment:
      GIT_PYTHON_REFRESH: quiet
      HOME: /home/appuser
      MPLCONFIGDIR: /tmp/matplotlib
      PYTHONWARNINGS: ignore::UserWarning:_distutils_hack
      XDG_CONFIG_HOME: /tmp/.config
      MODEL_PATH: /app/models/forecast_model.pkl
      DATA_DIR: /app/m5_data
      RANDOM_STATE: "42"
    volumes:
      - .:/app
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    restart: unless-stopped

  mlflow:
    build: .
    environment:
      GIT_PYTHON_REFRESH: quiet
      HOME: /home/appuser
      MPLCONFIGDIR: /tmp/matplotlib
      PYTHONWARNINGS: ignore::UserWarning:_distutils_hack
      XDG_CONFIG_HOME: /tmp/.config
    command:
      [
        "mlflow",
        "server",
        "--backend-store-uri",
        "sqlite:////app/mlflow.db",
        "--default-artifact-root",
        "/app/mlruns",
        "--host",
        "0.0.0.0",
        "--allowed-hosts",
        "localhost,localhost:5000,localhost:5001,127.0.0.1,127.0.0.1:5000,127.0.0.1:5001,mlflow,mlflow:5000",
        "--port",
        "5000"
      ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    ports:
      - "${MLFLOW_PORT:-5001}:5000"
    volumes:
      - .:/app
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    user: "0:0"
    working_dir: /opt/airflow/project
    environment:
      AIRFLOW_HOME: /opt/airflow/airflow_home
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      GIT_PYTHON_REFRESH: quiet
      PYTHONWARNINGS: ignore::UserWarning:_distutils_hack
      DATA_DIR: /opt/airflow/project/m5_data
      MODEL_DIR: /opt/airflow/project/models
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: >
      bash -c "mkdir -p /app/mlruns /app/models /opt/airflow/airflow_home/logs /opt/airflow/airflow_home/dags /opt/airflow/airflow_home/plugins &&
               chmod -R 0777 /app/mlruns /app/models &&
               chown -R 50000:0 /opt/airflow/airflow_home &&
               airflow db migrate &&
               airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    volumes:
      - .:/app
      - .:/opt/airflow/project
      - airflow_home:/opt/airflow/airflow_home

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    user: "50000:0"
    working_dir: /opt/airflow/project
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW_HOME: /opt/airflow/airflow_home
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      GIT_PYTHON_REFRESH: quiet
      PYTHONWARNINGS: ignore::UserWarning:_distutils_hack
      PYTHONPATH: /opt/airflow/project
      DATA_DIR: /opt/airflow/project/m5_data
      MODEL_DIR: /opt/airflow/project/models
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - .:/opt/airflow/project
      - airflow_home:/opt/airflow/airflow_home
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    user: "50000:0"
    working_dir: /opt/airflow/project
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW_HOME: /opt/airflow/airflow_home
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      GIT_PYTHON_REFRESH: quiet
      PYTHONWARNINGS: ignore::UserWarning:_distutils_hack
      PYTHONPATH: /opt/airflow/project
      DATA_DIR: /opt/airflow/project/m5_data
      MODEL_DIR: /opt/airflow/project/models
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: scheduler
    volumes:
      - .:/app
      - .:/opt/airflow/project
      - airflow_home:/opt/airflow/airflow_home
    restart: unless-stopped

volumes:
  airflow_home:
