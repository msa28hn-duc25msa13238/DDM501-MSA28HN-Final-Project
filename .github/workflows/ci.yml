name: CI

on:
  pull_request:
    branches: [main, develop, master]
  push:
    branches: [main, develop, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: |
          pip install ruff
          ruff check .
          ruff format --check .

      - name: pip-audit
        run: |
          pip install pip-audit
          # Temporary exception: Pygments CVE-2026-4539 currently has no fixed
          # release available on PyPI, so a version bump cannot remediate it yet.
          pip-audit -r requirements.txt --ignore-vuln CVE-2026-4539

      - name: Dependency sanity check
        run: python -m pip check

      - name: Run tests
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t m5-forecast-api:${{ github.sha }} .

      - name: Build Airflow image
        run: docker build -f Dockerfile.airflow -t m5-forecast-airflow:${{ github.sha }} .
