name: CD

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/m5-forecast-api:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/m5-forecast-api:latest

      - name: Build and push Airflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.airflow
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/m5-forecast-airflow:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/m5-forecast-airflow:latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
    steps:
      - name: Trigger staging deploy webhook
        if: ${{ env.DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -X POST "${{ env.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ github.sha }}","repository":"${{ github.repository }}"}'
